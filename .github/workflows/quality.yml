name: Engram quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: engram-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm run docs:check
      - run: npm run docs:lint

  public-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:public
      - run: npm run build:public
      - run: npm run verify:public
      - run: npm run smoke:public
        env:
          NEXT_PUBLIC_ENGRAM_TEST_SCENE_STATIC: "true"

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:check-public
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:regressions
      - run: npm run eval:memory
      - run: npm run test:example-real
      - run: npm run test:example-langgraph
      - run: npm run test:example-support
      - run: npm run test:example-regression
      - run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke -- --shard=${{ matrix.shard }}/4
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:distribution
