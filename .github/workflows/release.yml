name: Publish Engram packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (for example, 0.1.1)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.7.0
      - run: npm --version
      - run: npm ci
      - id: release-version
        name: Resolve release version
        env:
          RELEASE_REF: ${{ inputs.version || github.ref_name }}
        run: echo "value=${RELEASE_REF#v}" >> "$GITHUB_OUTPUT"
      - run: node scripts/verify-release-version.mjs "${{ steps.release-version.outputs.value }}"
      - run: npm test
      - run: npm run test:distribution
      - run: node scripts/publish-package.mjs @engramviz/core "${{ steps.release-version.outputs.value }}"
      - run: node scripts/publish-package.mjs @engramviz/sdk "${{ steps.release-version.outputs.value }}"
      - run: node scripts/publish-package.mjs @engramviz/adapter-mem0 "${{ steps.release-version.outputs.value }}"
      - run: node scripts/publish-package.mjs @engramviz/adapter-langgraph "${{ steps.release-version.outputs.value }}"
      - run: node scripts/publish-package.mjs @engramviz/studio "${{ steps.release-version.outputs.value }}"
      - run: node scripts/publish-package.mjs @engramviz/cli "${{ steps.release-version.outputs.value }}"
