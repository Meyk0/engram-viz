name: Publish Engram packages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: node scripts/verify-release-version.mjs "${GITHUB_REF_NAME#v}"
      - run: npm test
      - run: npm run test:distribution
      - run: node scripts/publish-package.mjs @engramviz/core "${GITHUB_REF_NAME#v}"
      - run: node scripts/publish-package.mjs @engramviz/sdk "${GITHUB_REF_NAME#v}"
      - run: node scripts/publish-package.mjs @engramviz/adapter-mem0 "${GITHUB_REF_NAME#v}"
      - run: node scripts/publish-package.mjs @engramviz/studio "${GITHUB_REF_NAME#v}"
      - run: node scripts/publish-package.mjs @engramviz/cli "${GITHUB_REF_NAME#v}"
